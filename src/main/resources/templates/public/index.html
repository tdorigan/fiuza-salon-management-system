<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{site.title}">Fiuza</title>

    <!-- adapted from https://getbootstrap.com/docs/5.3/examples/carousel/ -->
    <style>

        #headerCarousel {
            margin-bottom: 4rem;
        }

        #headerCarousel .carousel-caption {
            bottom: 3rem;
            z-index: 10;
        }

        #headerCarousel .carousel-item {
            height: 32rem;
            position: relative;
        }

        #headerCarousel .carousel-item img {
            height: 32rem;
            object-fit: cover;
        }

        /*to make the carousel images darker so we can properly see the text over it*/
        .carousel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .featurette-divider {
            margin: 5rem 0;
        }


        .product-card-image {
            height: 180px;
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            filter: invert(1);
        }

        .testimonial-card {
            max-width: 600px;
        }

        @media (max-width: 768px) {
            .testimonial-card {
                max-width: 90%;
            }
        }

    </style>

</head>
<body>

    <!--fragment navbar-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main>

        <!-- adapted from https://getbootstrap.com/docs/5.3/examples/carousel/ -->
        <!--header carousel-->
        <div id="headerCarousel" class="carousel slide mb-6" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <!--bottom buttons-->
                <button
                        type="button"
                        data-bs-target="#headerCarousel"
                        data-bs-slide-to="0"
                        class="active"
                        aria-current="true"
                        aria-label="Slide 1"
                ></button>
                <button
                        type="button"
                        data-bs-target="#headerCarousel"
                        data-bs-slide-to="1"
                        aria-label="Slide 2"
                ></button>
                <button
                        type="button"
                        data-bs-target="#headerCarousel"
                        data-bs-slide-to="2"
                        aria-label="Slide 3"
                ></button>
            </div>
            <!--carousel main content-->
            <div class="carousel-inner">

                <!--carousel first item-->
                <div class="carousel-item active">
                    <img th:src="@{/images/home/banner1.jpg}"
                         class="d-block w-100"
                         th:alt="#{home.banner1.alt}">
                    <div class="carousel-overlay"></div>
                    <div class="container">
                        <div class="carousel-caption text-start">
                            <h1 th:text="#{home.carousel.services.title}"></h1>
                            <p th:text="#{home.carousel.services.text}"></p>
                            <p>
                                <a class="btn btn-lg btn-primary"
                                   th:href="@{/public/services}"
                                   th:text="#{home.carousel.services.button}"></a>
                            </p>
                        </div>
                    </div>
                </div>

                <!--carousel second item-->
                <div class="carousel-item">
                    <img th:src="@{/images/home/banner2.jpg}"
                         class="d-block w-100"
                         th:alt="#{home.banner2.alt}">
                    <div class="carousel-overlay"></div>
                    <div class="container">
                        <div class="carousel-caption">
                            <h1 th:text="#{home.carousel.products.title}"></h1>
                            <p th:text="#{home.carousel.products.text}"></p>
                            <p>
                                <a class="btn btn-lg btn-primary"
                                   th:href="@{/public/products}"
                                   th:text="#{home.carousel.products.button}"></a>
                            </p>
                        </div>
                    </div>
                </div>

                <!--carousel third item-->
                <div class="carousel-item">
                    <img th:src="@{/images/home/banner3.jpg}"
                         class="d-block w-100"
                         th:alt="#{home.banner3.alt}">
                    <div class="carousel-overlay"></div>
                    <div class="container">
                        <div class="carousel-caption text-end">
                            <h1 th:text="#{home.carousel.portfolio.title}"></h1>
                            <p th:text="#{home.carousel.portfolio.text}"></p>
                            <p>
                                <a class="btn btn-lg btn-primary"
                                   th:href="@{/public/portfolio}"
                                   th:text="#{home.carousel.portfolio.button}"></a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!--carousel prev button-->
            <button
                    class="carousel-control-prev"
                    type="button"
                    data-bs-target="#headerCarousel"
                    data-bs-slide="prev"
            >
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>

            <!--carousel next button-->
            <button
                    class="carousel-control-next"
                    type="button"
                    data-bs-target="#headerCarousel"
                    data-bs-slide="next"
            >
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>

        </div>

        <!--features-->
        <!-- adapted from https://getbootstrap.com/docs/5.3/examples/carousel/ -->
        <div class="container marketing">

            <!-- feature 1-->
            <div class="row featurette align-items-center gy-4">
                <div class="col-md-7">
                    <h2 class="featurette-heading fw-normal lh-1">
                        <span th:text="#{home.feature1.title}"></span>
                    </h2>
                    <p class="lead" th:text="#{home.feature1.text}"></p>
                </div>
                <div class="col-md-5">
                    <img th:src="@{/images/home/feature1.jpg}"
                         class="featurette-image img-fluid mx-auto rounded shadow-sm"
                         th:alt="#{home.feature1.alt}">
                </div>
            </div>

            <hr class="featurette-divider" />

            <!-- feature 2-->
            <div class="row featurette align-items-center gy-4">
                <div class="col-md-7 order-md-2">
                    <h2 class="featurette-heading fw-normal lh-1">
                        <span th:text="#{home.feature2.title}"></span>
                    </h2>
                    <p class="lead" th:text="#{home.feature2.text}"></p>
                </div>
                <div class="col-md-5 order-md-1">
                    <img th:src="@{/images/home/feature2.jpg}"
                         class="featurette-image img-fluid mx-auto rounded shadow-sm"
                         th:alt="#{home.feature2.alt}">
                </div>
            </div>

            <hr class="featurette-divider" />

            <!-- feature 3-->
            <div class="row featurette align-items-center gy-4">
                <div class="col-md-7">
                    <h2 class="featurette-heading fw-normal lh-1">
                        <span th:text="#{home.feature3.title}"></span>
                    </h2>
                    <p class="lead" th:text="#{home.feature3.text}"></p>
                </div>
                <div class="col-md-5">
                    <img th:src="@{/images/home/feature3.jpg}"
                         class="featurette-image img-fluid mx-auto rounded shadow-sm"
                         th:alt="#{home.feature3.alt}">
                </div>
            </div>

            <hr class="featurette-divider" />

        </div>

        <section class="my-5 py-5">
            <div class="container">

                <!--Testimonials header-->
                <div class="text-center mb-4">
                    <h2 th:text="#{home.testimonials.title}"></h2>
                    <p class="text-muted" th:text="#{home.testimonials.text}"></p>
                </div>

                <!-- adapted from https://getbootstrap.com/docs/5.3/examples/carousel/ -->
                <!--testimonials carousel-->
                <div id="testimonialsCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <!--bottom buttons-->
                        <button
                                type="button"
                                data-bs-target="#testimonialsCarousel"
                                data-bs-slide-to="0"
                                class="active"
                                aria-current="true"
                                aria-label="Testimonial 1"
                        ></button>
                        <button
                                type="button"
                                data-bs-target="#testimonialsCarousel"
                                data-bs-slide-to="1"
                                aria-label="Testimonial 2"
                        ></button>
                        <button
                                type="button"
                                data-bs-target="#testimonialsCarousel"
                                data-bs-slide-to="2"
                                aria-label="Testimonial 3"
                        ></button>
                    </div>

                    <!--testimonials carousel main content-->
                    <div class="carousel-inner">

                        <!-- testimonial 1-->
                        <div class="carousel-item active mb-4 mt-4">
                            <div class="d-flex justify-content-center">
                                <div class="text-center p-4 rounded shadow-sm border bg-white mx-auto testimonial-card">
                                    <p th:text="#{home.testimonials.customer1.quote}"></p>
                                    <p th:text="#{home.testimonials.customer1.name}" class="fw-bold"></p>
                                </div>
                            </div>
                        </div>
                        <!-- testimonial 2-->
                        <div class="carousel-item mb-4 mt-4">
                            <div class="d-flex justify-content-center">
                                <div class="text-center p-4 rounded shadow-sm border bg-white mx-auto testimonial-card">
                                    <p th:text="#{home.testimonials.customer2.quote}"></p>
                                    <p th:text="#{home.testimonials.customer2.name}" class="fw-bold"></p>
                                </div>
                            </div>
                        </div>
                        <!-- testimonial 3-->
                        <div class="carousel-item mb-4 mt-4">
                            <div class="d-flex justify-content-center">
                                <div class="text-center p-4 rounded shadow-sm border bg-white mx-auto testimonial-card">
                                    <p th:text="#{home.testimonials.customer3.quote}"></p>
                                    <p th:text="#{home.testimonials.customer3.name}" class="fw-bold"></p>
                                </div>
                            </div>
                        </div>

                    </div>
                    <!--carousel prev button-->
                    <button
                            class="carousel-control-prev"
                            type="button"
                            data-bs-target="#testimonialsCarousel"
                            data-bs-slide="prev"
                    >
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <!--carousel next button-->
                    <button
                            class="carousel-control-next"
                            type="button"
                            data-bs-target="#testimonialsCarousel"
                            data-bs-slide="next"
                    >
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- find us section-->
        <section class="container my-5">

            <hr class="featurette-divider" />

            <!-- find us header-->
            <div class="text-center mb-4">
                <h2 th:text="#{home.findus.title}"></h2>
                <p th:text="#{home.findus.text}"></p>
            </div>

            <div class="row gy-4 align-items-stretch">
                <!-- map-->
                <div class="col-md-9">
                    <!--embedded map-->
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29312.082892148435!2d-46.764971664647085!3d-23.315382842767285!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cee6a7cb6f61eb%3A0xa321d69e795bf8a6!2sFranco%20da%20Rocha%2C%20State%20of%20S%C3%A3o%20Paulo%2C%20Brazil!5e0!3m2!1sen!2sie!4v1773587974887!5m2!1sen!2sie"
                            width="100%" height="350" style="border:0;" class="rounded" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

                <!-- contact info-->
                <div class="col-md-3">
                    <div class="bg-white border rounded shadow-sm p-4 h-100">

                        <div class="mb-4">
                            <h5 th:text="#{home.findus.address.title}"></h5>
                            <p class="mb-0 text-muted" th:text="#{home.findus.address}"></p>
                        </div>

                        <div class="mb-4">
                            <h5 th:text="#{home.findus.phone.title}"></h5>
                            <p class="mb-0 text-muted" th:text="#{home.findus.phone.phone}"></p>
                        </div>

                        <div>
                            <h5 th:text="#{home.findus.hours.title}"></h5>
                            <p class="mb-0 text-muted" th:text="${openingHours}"></p>
                        </div>

                    </div>
                </div>
            </div>

            <hr class="featurette-divider" />

        </section>

    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

</body>
</html>
