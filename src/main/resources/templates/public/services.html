<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{navigation.services}"></title>

</head>
<body>

    <!--fragment navbar-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main class="container my-4">

        <!--header-->
        <div class="mb-4 text-center">
            <h2 th:text="#{public.services.title}">Services</h2>
            <p class="text-muted" th:text="#{public.services.subtitle}">
                Explore our services.
            </p>
        </div>

        <!--checking if the list is empty to display a message -->
        <div th:if="${#lists.isEmpty(listServices)}" class="alert alert-info text-center">
            <span th:text="#{public.services.empty}">No services available at the moment.</span>
        </div>

        <!--only if the list is not empty will show the cards-->
        <div class="row g-3" th:if="${!#lists.isEmpty(listServices)}">

            <!--for each service in the list, list is passed via parameter by controller-->
            <div class="col-12 col-sm-6 col-lg-4" th:each="service : ${listServices}">

                <!--each service is a card-->
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">

                        <!--service image or placeholder-->
                        <div class="text-center my-3">

                            <!--shows the uploaded service image if it exists-->
                            <img th:if="${service.imageFileName != null}"
                                 th:src="@{'/uploads/services/' + ${service.imageFileName}}"
                                 class="img-fluid service-card-image"
                                 th:alt="${service.name}">

                            <!--shows the placeholder icon if the service has no image-->
                            <i th:if="${service.imageFileName == null}"
                               class="fa-regular fa-image fa-10x icon-dark"></i>
                        </div>

                        <!--divide card content in lines-->
                        <ul class="list-group list-group-flush flex-grow-1">
                            <!--title and description-->
                            <li class="list-group-item text-center">
                                <h5 class="card-title" th:text="${service.name}">Service Name</h5>
                                <p class="card-text text-muted" th:text="${service.description}">Description...</p>
                            </li>
                            <!--price-->
                            <li class="list-group-item text-center">
                                <strong th:text="#{public.services.price}">Price:</strong>
                                <span th:text="${service.price}">0</span>
                            </li>
                            <!--duration-->
                            <li class="list-group-item text-center">
                                <strong th:text="#{public.services.duration}">Duration:</strong>
                                <span th:text="${service.estimatedTimeMinutesDescription}">Duration</span>
                            </li>
                            <!--book appointment button-->
                            <li class="list-group-item text-center">
                                <a class="btn btn-primary w-100" th:href="@{/customer/appointments}" th:text="#{actions.bookAppointment}">
                                    Book an Appointment
                                </a>
                            </li>
                        </ul>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

</body>
</html>
