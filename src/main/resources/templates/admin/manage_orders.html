<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{navigation.manageOrders}"></title>

</head>
<body>

    <!--fragment navbar-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main class="container my-4">

        <!--header-->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 th:text="#{navigation.manageOrders}">Manage Orders</h2>
        </div>

        <!--flash success message, only show if exists-->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="#{${message}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--flash error message, only show if exists-->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="#{${errorMessage}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--checking if the list is empty to display a message -->
        <div th:if="${#lists.isEmpty(listOrders)}" class="alert alert-info text-center">
            <span th:text="#{order.orders.empty}">No orders yet.</span>
        </div>

        <!--only if the list is not empty will show the orders-->
        <div class="accordion" id="ordersAccordion" th:if="${!#lists.isEmpty(listOrders)}">

            <!--desktop column labels-->
            <div class="row g-2 px-3 py-2 mb-2 fw-bold text-muted small d-none d-lg-flex">
                <div class="col-lg-1" th:text="#{order.id}"></div>
                <div class="col-lg-2" th:text="#{order.customer.fullName}"></div>
                <div class="col-lg-3" th:text="#{order.customer.email}"></div>
                <div class="col-lg-2" th:text="#{order.dateTime}"></div>
                <div class="col-lg-2" th:text="#{order.status}"></div>
                <div class="col-lg-1" th:text="#{order.total}"></div>
                <div class="col-lg-1" th:text="#{page.orders.actions}"></div>
            </div>

            <div class="accordion-item mb-3" th:each="order : ${listOrders}">

                <!-- accordion header -->
                <h2 class="accordion-header" th:id="'heading-order-' + ${order.id}">

                    <div class="accordion-button collapsed"
                         role="button"
                         tabindex="0"
                         th:aria-controls="'collapse-order-' + ${order.id}"
                         aria-expanded="false"
                         th:onclick="'toggleOrderItems(' + ${order.id} + ', this)'">

                        <div class="container-fluid px-0">
                            <div class="row g-2 align-items-center w-100">

                                <!--order id-->
                                <div class="col-lg-1">
                                    <strong class="d-lg-none" th:text="#{order.id}"></strong>
                                    <span th:text="${order.id}"></span>
                                </div>

                                <!--customer full name-->
                                <div class="col-lg-2">
                                    <strong class="d-lg-none" th:text="#{order.customer.fullName}"></strong>
                                    <span th:text="${order.customer.fullName}"></span>
                                </div>

                                <!--customer email-->
                                <div class="col-lg-3">
                                    <strong class="d-lg-none" th:text="#{order.customer.email}"></strong>
                                    <span th:text="${order.customer.email}"></span>
                                </div>

                                <!--date time-->
                                <div class="col-lg-2">
                                    <strong class="d-lg-none" th:text="#{order.dateTime}"></strong>
                                    <span th:text="${#temporals.format(order.dateTime, 'dd/MM/yyyy HH:mm:ss')}"></span>
                                </div>

                                <!--status-->
                                <div class="col-lg-2">
                                    <strong class="d-lg-none" th:text="#{order.status}"></strong>
                                    <span th:text="${order.status}"></span>
                                </div>

                                <!--total-->
                                <div class="col-lg-1">
                                    <strong class="d-lg-none" th:text="#{order.total}"></strong>
                                    <span th:text="${order.totalOrder}"></span>
                                </div>

                                <!--cancel button-->
                                <div class="col-lg-1 d-flex align-items-center justify-content-lg-end gap-2 flex-nowrap">

                                    <!--cancel order, only available if status is PENDING-->
                                    <!--href is blank because it will be set on showCancelModal function on the modal yes button-->
                                    <!--i'm also passing the link with the id as attribute data-url-->
                                    <a th:if="${order.status != null and order.status.name == 'PENDING'}"
                                       th:title="#{actions.cancel}"
                                       href="#"
                                       th:attr="data-url=@{'/admin/order/cancel/' + ${order.id}}"
                                       class="cancel-order-btn">

                                        <i class="fa-regular fa-rectangle-xmark fa-2x icon-red"></i>

                                    </a>

                                    <!--mark as PAID, only available if status is PENDING-->
                                    <a th:if="${order.status != null and order.status.name == 'PENDING'}"
                                       th:title="#{actions.markAsPaid}"
                                       href="#"
                                       th:attr="data-url=@{'/admin/order/markAsPaid/' + ${order.id}}"
                                       class="mark-as-paid-btn">

                                        <i class="fa-solid fa-check fa-2x icon-green"></i>

                                    </a>

                                </div>

                            </div>
                        </div>

                    </div>

                </h2>

                <!-- accordion body -->
                <div class="accordion-collapse collapse"
                     th:id="'collapse-order-' + ${order.id}"
                     th:aria-labelledby="'heading-order-' + ${order.id}">

                    <div class="accordion-body">

                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th th:text="#{order.item.product}"></th>
                                    <th class="text-center" th:text="#{order.item.quantity}"></th>
                                    <th class="text-end" th:text="#{order.item.unitPrice}"></th>
                                    <th class="text-end" th:text="#{order.item.subtotal}"></th>
                                </tr>
                                </thead>
                                <tbody>
                                <!--each item in a row of the secondary table-->
                                <tr th:each="item : ${order.items}">
                                    <td th:text="${item.product.name}"></td>
                                    <td class="text-center" th:text="${item.quantity}"></td>
                                    <td class="text-end" th:text="${item.unitPriceAtPurchase}"></td>
                                    <td class="text-end" th:text="${item.quantity * item.unitPriceAtPurchase}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- hidden elements just to store the tranlsated messages -->
        <span id="msgCancelConfirm" th:text="#{confirm.cancelOrder}" style="display:none;"></span>
        <span id="msgMarkAsPaidConfirm" th:text="#{confirm.markAsPaid}" style="display:none;"></span>

        <!-- confirmation modal -->
        <div class="modal fade text-center" id="confirmModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="#{modal.confirmation.title}">Confirmation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <span id="confirmText"></span>
                    </div>
                    <div class="modal-footer">
                        <form id="confirmForm" method="post" action="">
                            <!--i need to manually add the csrf hidden field because the form has no action, so thymeleaf won't add it automatically-->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-success">
                                <span th:text="#{actions.yes}">Yes</span>
                            </button>
                        </form>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                            <span th:text="#{actions.no}">No</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

    <script>

        //select all elements that have the class mark-as-paid-btn
        document.querySelectorAll('.mark-as-paid-btn').forEach(button => {

            //for each element found adds a click event listener
            button.addEventListener('click', function (event) {

                //prevent default behavior of the link so the page doesn't jump to the top when clicked
                event.preventDefault();

                //to prevent the accordion to expand/collapse when clicked mark as paid button
                event.stopPropagation();

                //calls the function to show the mark as paid confirmation modal
                showMarkAsPaidModal(this);
            });
        });

        //select all elements that have the class cancel-order-btn
        document.querySelectorAll('.cancel-order-btn').forEach(button => {

            //for each element found adds a click event listener
            button.addEventListener('click', function (event) {

                //prevent default behavior of the link so the page doesn't jump to the top when clicked
                event.preventDefault();

                //to prevent the accordion to expand/collapse when clicked cancel button
                event.stopPropagation();

                //calls the function to show the cancel confirmation modal
                showCancelModal(this);
            });
        });

        //show cancel confirmation modal
        function showCancelModal(link) {

            /*getting the data-url attribute*/
            const url = link.getAttribute("data-url");

            /*getting the translated message from the hidden span*/
            const confirmMessage = document.getElementById("msgCancelConfirm").innerText;

            /*put the translated confirmation message in the modal*/
            document.getElementById("confirmText").innerText = confirmMessage;

            /*set the action of the modal yes button*/
            document.getElementById("confirmForm").setAttribute("action", url);

            /*show modal*/
            const modal = new bootstrap.Modal(
                document.getElementById("confirmModal")
            );
            modal.show();
        }

        //show mark as paid confirmation modal
        function showMarkAsPaidModal(link) {

            /*getting the data-url attribute*/
            const url = link.getAttribute("data-url");

            /*getting the translated message from the hidden span*/
            const confirmMessage = document.getElementById("msgMarkAsPaidConfirm").innerText;

            /*put the translated confirmation message in the modal*/
            document.getElementById("confirmText").innerText = confirmMessage;

            /*set the action of the modal yes button*/
            document.getElementById("confirmForm").setAttribute("action", url);

            /*show modal*/
            const modal = new bootstrap.Modal(
                document.getElementById("confirmModal")
            );
            modal.show();
        }

        //to expand/collapse the order items when clicking the order header
        function toggleOrderItems(orderId, headerElement) {

            //get the collapse element (accordion body) using the order id
            const collapseElement = document.getElementById("collapse-order-" + orderId);

            //get or create a bootstrap collapse instance for that element
            const collapseInstance = bootstrap.Collapse.getOrCreateInstance(collapseElement, {
                //so it won't automatically open/close when created
                toggle: false
            });

            //toggle (expand/collapse) instance
            collapseInstance.toggle();

            //toggle the collapsed class on the header, to control the arrow direction
            headerElement.classList.toggle("collapsed");

            //get the current aria-expanded value (accessibility attribute)
            const isExpanded = headerElement.getAttribute("aria-expanded") === "true";

            //updates the aria-expanded to the opposite value
            headerElement.setAttribute("aria-expanded", !isExpanded);

        }

    </script>

</body>
</html>
