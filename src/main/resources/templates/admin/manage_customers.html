<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{navigation.manageCustomers}"></title>

</head>
<body>

    <!--navbar fragment-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main class="container my-4">

        <!--header-->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 th:text="#{navigation.manageCustomers}">Manage Customers</h2>
        </div>

        <!--flash success message, only show if exists-->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="#{${message}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--flash error message, only show if exists-->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="#{${errorMessage}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--checking if the list is empty to display a message -->
        <div th:if="${#lists.isEmpty(listCustomers)}" class="alert alert-info text-center">
            <span th:text="#{customers.customer.empty}">No customers yet.</span>
        </div>

        <!--only if the list is not empty will show the customers-->
        <div th:if="${!#lists.isEmpty(listCustomers)}">

            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th th:text="#{page.customer.id}">Id</th>
                        <th th:text="#{page.customer.fullName}">Full Name</th>
                        <th th:text="#{page.customer.email}">Email</th>
                        <th th:text="#{page.customer.phone}">Phone</th>
                        <th th:text="#{page.customer.address}">Address</th>
                        <th th:text="#{page.customer.enabled}">Enabled</th>
                        <th th:text="#{page.customer.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!--getting list of users by parameter listCustomers from user controller-->
                    <tr th:each="customer : ${listCustomers}">

                        <td th:text="${customer.id}"></td>
                        <td th:text="${customer.fullName}"></td>
                        <td th:text="${customer.email}"></td>
                        <td th:text="${customer.phone}"></td>
                        <td th:text="${customer.address}"></td>

                        <!--user enabled icon-->
                        <td>
                            <div class="d-flex align-items-center justify-content-center flex-nowrap">
                                <form th:if="${customer.enabled}"
                                      th:action="@{'/admin/customers/toggleActive/' + ${customer.id}}"
                                      method="post"
                                      class="d-inline">
                                    <button type="submit" class="btn p-0 border-0 bg-transparent" th:title="#{actions.disable}">
                                        <i class="fas fa-check-circle fa-2x icon-green"></i>
                                    </button>
                                </form>

                                <form th:if="${!customer.enabled}"
                                      th:action="@{'/admin/customers/toggleActive/' + ${customer.id}}"
                                      method="post"
                                      class="d-inline">
                                    <button type="submit" class="btn p-0 border-0 bg-transparent" th:title="#{actions.enable}">
                                        <i class="fas fa-circle fa-2x icon-dark"></i>
                                    </button>
                                </form>
                            </div>
                        </td>

                        <!--actions-->
                        <td>
                            <div class="d-flex align-items-center justify-content-center gap-2 flex-nowrap">
                                <!--edit-->
        <!--                        <a th:title="#{actions.edit}" th:href="@{'/admin/customers/edit/' + ${customer.id}}">-->
        <!--                            <i class="fas fa-edit fa-2x icon-green"></i>-->
        <!--                        </a>-->

                                <!--delete, href is blank because it will be set on showConfirmModal function on the modal yes button-->
                                <!--i'm also passing the link with the id as attribute data-url-->
                                <a th:title="#{actions.delete}"
                                   href="#"
                                   th:attr="data-url=@{'/admin/customers/delete/' + ${customer.id}}"
                                   onclick="showConfirmModal(this); return false;">
                                    <i class="fas fa-trash fa-2x icon-dark"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- hidden element just to store the tranlsated message -->
        <span id="msgDeleteConfirm" th:text="#{confirm.deleteCustomer}" style="display:none;"></span>

        <!-- confirmation modal -->
        <div class="modal fade text-center" id="confirmModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="#{modal.confirmation.title}">Confirmation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <span id="confirmText"></span>
                    </div>
                    <div class="modal-footer">
                        <form id="confirmForm" method="post" action="">
                            <!--i need to manually add the csrf hidden field because the form has no action, so thymeleaf won't add it automatically-->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit" class="btn btn-success">
                                <span th:text="#{actions.yes}">Yes</span>
                            </button>
                        </form>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                            <span th:text="#{actions.no}">No</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

    <script>
        //show modal to confirm deletion
        function showConfirmModal(link) {

            /*getting the data-url attribute*/
            const url = link.getAttribute("data-url");

            /*getting the translated message from the hidden span*/
            const confirmMessage = document.getElementById("msgDeleteConfirm").innerText;

            /*put the translated message to the modal*/
            document.getElementById("confirmText").innerText = confirmMessage;

            /*set the action of the modal yes button*/
            document.getElementById("confirmForm").setAttribute("action", url);

            /*show modal*/
            const modal = new bootstrap.Modal(
                document.getElementById("confirmModal")
            );
            modal.show();
        }
    </script>

</body>
</html>
