<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{${pageTitle}}">Service</title>

</head>
<body>

    <!--fragment navbar-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main class="container my-4">

        <!--page header, title and back button-->
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="m-0" th:text="#{${pageTitle}}">Service</h2>
            <a class="btn btn-outline-secondary" th:href="@{/admin/manage_services}" th:text="#{actions.back}">Back</a>
        </div>

        <!--error message, only shown if exists-->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="#{${errorMessage}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--form, using the service object received from the controller-->
        <form th:action="@{/admin/services/save}" method="post" enctype="multipart/form-data" th:object="${service}" class="card">
            <div class="card-body">

                <!--hidden id field-->
                <input type="hidden" th:field="*{id}" />

                <!--keeps the current image reference when the form returns with validation errors-->
                <input type="hidden" th:field="*{imageFileName}" />

                <!--name-->
                <div class="mb-3">
                    <label class="form-label" th:text="#{page.service.name}">Name</label>
                    <input type="text" class="form-control" th:field="*{name}" maxlength="100" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <!--description-->
                <div class="mb-3">
                    <label class="form-label" th:text="#{page.service.description}">Description</label>
                    <textarea class="form-control" rows="3" th:field="*{description}" maxlength="500"></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <!--price-->
                <div class="mb-3">
                    <label class="form-label" th:text="#{page.service.price}">Price</label>
                    <input type="number" step="0.01" min="0" max="99999999.99" class="form-control" th:field="*{price}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <!--duration / estimated time-->
                <div class="mb-3">
                    <label class="form-label" th:text="#{page.service.estimatedTime}">Duration</label>

                    <!--dropdown with the duration option from the utility class-->
                    <select class="form-select" th:field="*{estimatedTimeMinutes}" required>
                        <!--empty option indicating to select one-->
                        <option value="" th:text="#{form.selectDuration}">Select duration</option>
                        <!--for each duration on the list it adds an option-->
                        <option th:each="duration : ${durationOptions}"
                                th:value="${duration.key}"
                                th:text="${duration.value}">
                        </option>
                    </select>

                    <div class="text-danger small" th:if="${#fields.hasErrors('estimatedTimeMinutes')}" th:errors="*{estimatedTimeMinutes}"></div>
                </div>

                <!--service image-->
                <div class="mb-3">
                    <!--label for the image upload field-->
                    <label class="form-label" th:text="#{page.service.image}">Service Image</label>

                    <!--file input used to upload a service image-->
                    <!--data-max-size receives the value from application.properties via GlobalControllerAdvice-->
                    <!--data-error-message receives the translated error message from messages.properties-->
                    <input type="file"
                           name="imageFile"
                           accept="image/jpeg,image/png,image/webp"
                           class="form-control image-upload-input"
                           th:attr="data-max-size=${maxImageSizeBytes}, data-error-message=#{image.message.fileTooLarge}">

                    <!--empty error message area used by JavaScript when the selected image is too large-->
                    <div class="text-danger small mt-1 image-upload-error" style="display: none;"></div>

                    <div class="form-text" th:text="#{image.form.help}">
                        Maximum file size: 5MB. Accepted formats: JPG, PNG, or WEBP.
                    </div>

                    <!--current image preview, only shown when the service already has an image-->
                    <div class="mt-3" th:if="${service.imageFileName != null}">

                        <!--current image label-->
                        <p class="text-muted mb-1" th:text="#{page.service.currentImage}">Current image:</p>

                        <!--shows current service image only when a valid Cloudflare R2 image URL exists-->
                        <img th:if="${serviceImageUrl != null}"
                             th:src="${serviceImageUrl}"
                             class="img-thumbnail"
                             style="max-width: 180px;"
                             alt="Service image">

                        <!--shows placeholder icon when service has an image reference but the image is missing from R2-->
                        <i th:if="${serviceImageUrl == null}"
                           class="fa-regular fa-image fa-5x icon-dark"></i>

                        <!--remove image checkbox-->
                        <div class="form-check mt-2">

                            <!--checkbox sent only when the admin wants to remove the image-->
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="removeImage"
                                   id="removeImage">

                            <!--checkbox label-->
                            <label class="form-check-label"
                                   for="removeImage"
                                   th:text="#{page.service.removeImage}">
                                Remove current image
                            </label>
                        </div>
                    </div>
                </div>

                <!--active-->
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="active">
                    <label class="form-check-label" for="active" th:text="#{page.service.active}">Active</label>
                </div>

                <!--save button-->
                <button type="submit" class="btn btn-primary" th:text="#{actions.save}">Save</button>

            </div>
        </form>

    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

</body>
</html>
