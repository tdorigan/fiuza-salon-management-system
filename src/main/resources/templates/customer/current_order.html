<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>

    <!--head common fragment-->
    <th:block th:replace="~{fragments/fragment_head_common :: head_common}"></th:block>

    <title th:text="#{order.cart.title}"></title>

</head>
<body>

    <!--fragment navbar-->
    <div th:replace="~{fragments/fragment_navbar :: fragmentNavbar}"></div>

    <main class="container my-4">

        <!--header-->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 th:text="#{order.cart.title}">Shopping Cart</h2>
        </div>

        <!--flash success message, only show if exists-->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="#{${message}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--flash error message, only show if exists-->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="#{${errorMessage}}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!--checking if the currentOrder is null or does not have items to display a message -->
        <div th:if="${currentOrder == null or #lists.isEmpty(currentOrder.items)}" class="alert alert-info text-center">
            <span th:text="#{order.current.empty}">Your current order is empty.</span>
        </div>

        <!--only if the list is not empty will show the current order-->
        <div th:if="${currentOrder != null and !#lists.isEmpty(currentOrder.items)}">

            <!--order header-->
            <div>
                <div class="mb-1">
                    <h4>
                        <span th:text="#{order.id}">Id</span>:
                        <span th:text="${currentOrder.id}"></span>
                    </h4>
                </div>
                <div class="mb-1">
                    <h4>
                        <span th:text="#{order.dateTime}">Id</span>:
                        <span th:text="${#temporals.format(currentOrder.dateTime, 'dd/MM/yyyy HH:mm:ss')}"></span>
                    </h4>
                </div>
            </div>

            <!--table for the items-->
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <!--table header-->
                    <thead class="table-primary">
                        <tr>
                            <th th:text="#{order.item.product}">Product</th>
                            <th th:text="#{order.item.unitPrice}">Unit Price</th>
                            <th th:text="#{order.item.quantity}">Quantity</th>
                            <th th:text="#{order.item.subtotal}">Subtotal</th>
                            <th th:text="#{page.orders.actions}">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                    <!--each item in a row of the secondary table-->
                    <tr th:each="item : ${currentOrder.items}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.unitPriceAtPurchase}"></td>

                        <!--quantity-->
                        <td>
                            <div class="d-flex align-items-center justify-content-center gap-2 flex-nowrap">
                                <!--btn decrease quantity, disabled if 1-->
                                <a th:if="${item.quantity <= 1}" class="disabled btn btn-primary btn-sm" th:title="#{actions.decrementQuantity}">
                                    <i class="fa-solid fa-minus"></i>
                                </a>

                                <!--btn decrease quantity, enabled if more than 1-->
                                <form th:if="${item.quantity > 1}"
                                      th:action="@{'/customer/current_order/decreaseItemQuantity/' + ${item.id}}"
                                      method="post"
                                      class="d-inline">

                                    <button type="submit" class="btn btn-primary btn-sm" th:title="#{actions.decrementQuantity}">
                                        <i class="fa-solid fa-minus"></i>
                                    </button>

                                </form>

                                <!--quantity-->
                                <span th:text="${item.quantity}"></span>

                                <!--btn increase quantity-->
                                <form th:action="@{'/customer/current_order/increaseItemQuantity/' + ${item.id}}"
                                      method="post"
                                      class="d-inline">

                                    <button type="submit" class="btn btn-primary btn-sm" th:title="#{actions.incrementQuantity}">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>

                                </form>

                            </div>
                        </td>

                        <td th:text="${item.quantity * item.unitPriceAtPurchase}"></td>
                        <td>

                            <!-- delete item from current order -->
                            <a th:title="#{actions.delete}"
                               href="#"
                               th:attr="data-url=@{'/customer/current_order/delete/' + ${item.id}}"
                               onclick="showDeleteModal(this); return false;">
                                <i class="fas fa-trash fa-2x icon-dark"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!--total and place order button-->
            <div class="d-flex justify-content-between align-items-center">
                <h4>
                    <span th:text="#{order.total}">Total</span>:
                    <span th:text="${currentOrder.totalOrder}">0</span>
                </h4>

                <a class="btn btn-primary"
                   href="#"
                   th:attr="data-url=@{'/customer/current_order/place'}"
                   onclick="showConfirmPlaceOrderModal(this); return false;"
                   th:text="#{order.place}">
                    Place Order
                </a>

            </div>
        </div>

        <!-- hidden element just to store the tranlsated message -->
        <span id="msgDeleteConfirm" th:text="#{confirm.deleteProduct}" style="display:none;"></span>
        <span id="msgPlaceConfirm" th:text="#{confirm.placeOrder}" style="display:none;"></span>

        <!-- confirmation modal -->
        <div class="modal fade text-center" id="confirmModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" th:text="#{modal.confirmation.title}">Confirmation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <span id="confirmText"></span>
                    </div>
                    <div class="modal-footer">
                        <form id="confirmForm" method="post" action="">
                            <!--i need to manually add the csrf hidden field because the form has no action, so thymeleaf won't add it automatically-->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-success">
                                <span th:text="#{actions.yes}">Yes</span>
                            </button>
                        </form>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                            <span th:text="#{actions.no}">No</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!--fragment footer-->
    <div th:replace="~{fragments/fragment_footer :: fragmentFooter}"></div>

    <!--fragment scripts (bootstrap)-->
    <th:block th:replace="~{fragments/fragment_scripts :: bootstrap_scripts}"></th:block>

    <script>
        //show modal to confirm deletion
        function showDeleteModal(link) {

            /*getting the data-url attribute*/
            const url = link.getAttribute("data-url");

            /*getting the translated message from the hidden span*/
            const confirmMessage = document.getElementById("msgDeleteConfirm").innerText;

            /*put the translated message to the modal*/
            document.getElementById("confirmText").innerText = confirmMessage;

            /*set the action of the modal yes button form with the url*/
            document.getElementById("confirmForm").setAttribute("action", url);

            /*show modal*/
            const modal = new bootstrap.Modal(
                document.getElementById("confirmModal")
            );
            modal.show();
        }

        //show complete confirmation modal
        function showConfirmPlaceOrderModal(link) {

            /*getting the data-url attribute*/
            const url = link.getAttribute("data-url");

            /*getting the translated message from the hidden span*/
            const confirmMessage = document.getElementById("msgPlaceConfirm").innerText;

            /*put the translated message and the name of the service to the modal*/
            document.getElementById("confirmText").innerText = confirmMessage;

            /*set the action of the modal yes button form with the url*/
            document.getElementById("confirmForm").setAttribute("action", url);

            /*show modal*/
            const modal = new bootstrap.Modal(
                document.getElementById("confirmModal")
            );
            modal.show();
        }
    </script>

</body>
</html>
