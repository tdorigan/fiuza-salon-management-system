spring.application.name=Fiuza

#database connection and configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:fiuza_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:true}

#image upload folder
app.upload.dir=${APP_UPLOAD_DIR:uploads}

#internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
