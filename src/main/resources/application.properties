spring.application.name=Fiuza

#database connection and configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fiuza_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:true}

#image upload folder
app.upload.dir=${APP_UPLOAD_DIR:uploads}

#internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8
spring.messages.fallback-to-system-locale=false