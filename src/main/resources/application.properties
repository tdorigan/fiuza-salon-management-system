spring.application.name=Fiuza

#database connection and configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:fiuza_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:true}

#Cloudflare R2 bucket name
cloudflare.r2.bucket-name=${R2_BUCKET_NAME:}

#Cloudflare R2 public URL used by the browser to display images
cloudflare.r2.public-url=${R2_PUBLIC_URL:}

#Cloudflare R2 S3-compatible API endpoint used by the backend to upload/delete/check images
cloudflare.r2.endpoint=${R2_ENDPOINT:}

#Cloudflare R2 access key id
cloudflare.r2.access-key-id=${R2_ACCESS_KEY_ID:}

#Cloudflare R2 secret access key
cloudflare.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}

#defines whether the public URL already points directly to the bucket
cloudflare.r2.public-url-includes-bucket=${R2_PUBLIC_URL_INCLUDES_BUCKET:false}

#application image validation limit (5MB)
app.upload.max-image-size-bytes=${APP_UPLOAD_MAX_IMAGE_SIZE_BYTES:5242880}

#technical multipart request limits
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

#maximum number of parts allowed in multipart/form-data requests
#needed because product/service forms contain normal fields + file input + csrf token
server.tomcat.max-part-count=${SERVER_TOMCAT_MAX_PART_COUNT:50}

#internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
